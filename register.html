<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إنشاء حساب | مملكة الروايات</title>
  <meta name="description" content="أنشئ حسابًا كقارئ أو كاتب داخل مملكة الروايات وابدأ رحلتك في القراءة والنشر.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="app-header"></div>

  <main class="container auth-page">
    <section class="auth-card">
      <span class="eyebrow">انضم إلى المجتمع</span>
      <h1>إنشاء حساب</h1>
      <p class="muted">سجّل كقارئ أو كاتب وابدأ رحلتك داخل مملكة الروايات.</p>
      <form class="auth-form" id="registerForm">
        <div class="auth-message info" data-auth-message hidden></div>
        <div class="form-field">
          <label for="name">الاسم</label>
          <input class="form-control" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="form-field">
          <label for="email">البريد الإلكتروني</label>
          <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label for="password">كلمة المرور</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="form-field">
          <label for="confirmPassword">تأكيد كلمة المرور</label>
          <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="form-field">
          <label for="role">نوع الحساب</label>
          <select class="form-control" id="role" name="role" required>
            <option value="reader">قارئ</option>
            <option value="author">كاتب</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">إنشاء الحساب</button>
      </form>
      <p class="auth-alt">لديك حساب؟ <a href="login.html">سجّل الدخول</a></p>
    </section>
  </main>

  <div id="app-footer"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
