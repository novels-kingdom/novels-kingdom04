<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول | مملكة الروايات</title>
  <meta name="description" content="سجّل الدخول إلى حسابك في مملكة الروايات لمتابعة النشر والتعليقات ولوحة التحكم.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">  
<link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="app-header"></div>

  <main class="container auth-page">
    <section class="auth-card">
      <span class="eyebrow">مرحبًا بعودتك</span>
      <h1>تسجيل الدخول</h1>
<p class="muted">ادخل إلى حسابك لمتابعة رواياتك وتعليقاتك المحفوظة في قاعدة البيانات.</p>
      <form class="auth-form" id="loginForm">
        <div class="auth-message info" data-auth-message hidden></div>
<div class="form-field">
          <label for="email">البريد الإلكتروني</label>
          <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label for="password">كلمة المرور</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" type="submit">دخول</button>
      </form>
      <p class="auth-alt">لا تملك حسابًا؟ <a href="register.html">أنشئ حسابًا جديدًا</a></p>
    </section>
  </main>

  <div id="app-footer"></div> 

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
